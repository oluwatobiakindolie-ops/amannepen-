<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Amannepen</title>
  <meta name="description" content="Get in touch with Amannepen." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Newsreader:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <nav class="navbar container">
      <a href="index.html" class="logo">Amannepen</a>

      <button class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#articles">Articles</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="page-banner">
      <span class="eyebrow">Contact</span>
      <h1>Say hello</h1>
    </section>

    <section>
      <!--
        Frontend-only form: submitting shows a confirmation message via
        script.js. Connect this to an email service or backend endpoint
        (e.g. Formspree, a serverless function) to actually receive messages.
      -->
      <form id="contact-form" class="contact-form">
        <div class="form-field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required />
        </div>

        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>

        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
        </div>

        <button type="submit" class="btn">Send Message</button>
        <p id="form-status" class="form-status" role="status"></p>
      </form>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Amannepen</p>
      <p>Helping young people navigate life with clarity and intention.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
